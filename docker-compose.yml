services:
  db:
    image: postgres:15-alpine
    container_name: lavapro-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
      - ./app/sql/seed_data.sql:/docker-entrypoint-initdb.d/seed_data.sql
    networks:
      - lavapro_network

  backend:
    container_name: lavapro-backend
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://lavapro:lavapropass!123@db:5432/lavapro_api
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - lavapro_network

networks:
  lavapro_network:
    driver: bridge

volumes:
  postgres_local_data:
